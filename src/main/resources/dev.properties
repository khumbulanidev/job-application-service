


# Enable the H2 console
spring.h2.console.enabled=true
# Customize the console path (default is /h2-console)
spring.h2.console.path=/h2-console
# Specify the JDBC URL for an in-memory database named 'testdb'
spring.datasource.url=jdbc:h2:mem:job-app
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
# Configure Hibernate DDL behavior
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql: true